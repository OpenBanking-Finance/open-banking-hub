version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: openbanking_db
    environment:
      POSTGRES_DB: ${DB_NAME:-open_banking_hub}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-open_banking_hub}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: openbanking_keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      postgres:
        condition: service_healthy

  hub:
    build: .
    container_name: openbanking_api_hub
    ports:
      - "3000:3000"
    environment:
      - DB_NAME=${DB_NAME:-open_banking_hub}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-postgres}
      - DB_HOST=postgres
      - DB_PORT=5432
      - SESSION_SECRET=${SESSION_SECRET:-a-very-long-and-secure-session-secret-key-here}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    command: sh -c "npx knex migrate:latest --knexfile knexfile.cjs && npm start"

volumes:
  postgres_data: